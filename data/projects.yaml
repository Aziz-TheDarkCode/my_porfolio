# Fields:
#   title         – project name
#   featured      – true | false
#   ghost_number  – decorative "01", "02" etc. shown in background
#   desc          – short description shown in the card
#   tags          – list of pills (UX Research, UI Design, etc.)
#   cta_label     – button text
#   cta_href      – button link (use "#" as placeholder)
#   mockup_color  – hex colour for the right-side mockup block
# ─────────────────────────────────────────────────────────────────────────

